name: tdc
channels:
  - nodefaults
  - https://conda.anaconda.org/conda-forge
dependencies:
  - python=3.11
  - pip>=25
  - numpy=1.26.4
  - setuptools<81

  - anndata>=0.6.22
  - biopython>=1.78
  - fuzzywuzzy>=0.18.0
  - huggingface_hub>=0.20.3
  - bioconda::mygene>=3.2.2
  - openpyxl>=3.0.10
  - requests>=2.31.0
  - scikit-learn<=1.2.2
  - seaborn>=0.12.2
  - tqdm>=4.65.0
  - pandas>=2.1.4
  - pydantic>=2.6.3
  - rdkit>=2023.9.5
  - pytest
  - yapf

  - pip:
    - accelerate>=0.33.0
    - cellxgene-census>=1.15.0
    - datasets<2.20.0
    - transformers>=4.43.4
    - evaluate>=0.4.2
    - gget>=0.28.4
    - dgl>=1.1.3
    - tiledbsoma>=1.11.4
    - moleculeace>=3.0.0
    - pytest==8.3.2
    - scvi-tools>=1.2.0
    - torch==2.1.1
    - torch_geometric==2.5.3
    - torchvision==0.16.1

variables:
  KMP_DUPLICATE_LIB_OK: "TRUE"
